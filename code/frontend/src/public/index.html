<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
    <script src="./script.js"></script>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div id="search_box">
        <form id="search" hx-post="/api/sdk_search">
            <input type="text" placeholder="Search.." name="search" placeholder="Search..." hx-get="/api/sdk_search"
                hx-swap="innerHTML" hx-target="#sdk_results" hx-trigger="keyup changed delay:300ms">
        </form>

        <select class="dropdown-content" id="sdk_results">
        </select>
    </div>
    <div id="matrix-area"></div>

    <table id="matrix" border="1" cellpadding="0" cellspacing="0" style="border-collapse: collapse" width="60%">

    </table>
    <style>

    </style>
</body>

</html>
